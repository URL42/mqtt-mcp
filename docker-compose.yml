services:
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto-data:/mosquitto/data

  mqtt-mcp:
    build: .
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "${MCP_HOST_PORT:-8000}:8000"
    environment:
      MQTT_HOST: mosquitto
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}

volumes:
  mosquitto-data:
